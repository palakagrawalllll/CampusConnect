{% extends 'base.html' %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to your CampusConnect account</div>

    <form method="POST" autocomplete="off" id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" id="emailInput" placeholder="you@campus.edu" autocomplete="off" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" id="passwordInput" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:0.85rem;font-size:1rem;margin-top:0.5rem;">Sign In</button>
    </form>

    <script>
      // Clear fields upon loading the login page (especially after logout)
      document.addEventListener("DOMContentLoaded", function() {
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
      });
    </script>

    <div class="auth-footer">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </div>

    <div class="demo-box">
      <strong style="color:var(--text-main);display:block;margin-bottom:0.4rem;">Demo Credentials:</strong>
      <div style="display:flex;justify-content:space-between;margin-bottom:0.2rem;">
        <span>Student:</span> <strong>arjun@campus.edu / student123</strong>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span>Faculty:</span> <strong>priya@campus.edu / faculty123</strong>
      </div>
    </div>
  </div>
</div>
{% endblock %}
