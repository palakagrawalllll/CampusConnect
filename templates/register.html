{% extends 'base.html' %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Join the CampusConnect community</div>

    <form method="POST">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group" style="grid-column: span 2;">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@campus.edu" required>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Password</label>
          <input type="password" name="password" placeholder="Create a strong password" required>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Role</label>
          <select name="role" id="roleSelect" onchange="toggleFacultyFields()">
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
          </select>
        </div>
      </div>

      <div id="facultyFields" style="display:none; animation: fadeIn 0.3s ease-out; margin-top:0.5rem; background: rgba(79, 70, 229, 0.04); padding: 1.25rem; border-radius: 12px; border: 1px dashed var(--border);">
        <strong style="display:block;margin-bottom:1rem;color:var(--primary);font-size:0.95rem;">Faculty Details</strong>
        <div class="form-group">
          <label>Department</label>
          <input type="text" name="department" placeholder="e.g. Computer Science">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;">
          <div class="form-group" style="margin-bottom:0;">
            <label>Building</label>
            <input type="text" name="building" placeholder="Tech Blk">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>Floor</label>
            <input type="text" name="floor" placeholder="2nd">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>Room No.</label>
            <input type="text" name="room" placeholder="201">
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:0.85rem;font-size:1rem;margin-top:1.5rem;">Register Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
    </div>
  </div>
</div>

<script>
function toggleFacultyFields() {
  const role = document.getElementById('roleSelect').value;
  document.getElementById('facultyFields').style.display = role === 'faculty' ? 'block' : 'none';
}
</script>
{% endblock %}
